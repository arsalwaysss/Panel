<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Panel - ModCombo Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c10; color: #eef2ff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        .header { background: #111317; padding: 20px 0; border-bottom: 1px solid #f59e0b; margin-bottom: 30px; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111317; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #f59e0b; }
        .stat-number { font-size: 2rem; font-weight: 800; color: #f59e0b; }
        .search-input { padding: 12px; background: #1a1e26; border: 1px solid #2d2f3e; border-radius: 12px; color: white; margin-bottom: 20px; width: 100%; max-width: 300px; }
        .user-card { background: #111317; border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #2d2f3e; }
        .user-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: #0a0c10; }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d2f3e; }
        th { color: #f59e0b; }
        .status-pending { background: #f59e0b; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-block; color: #0a0c10; }
        .status-approved { background: #10b981; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .status-rejected { background: #ef4444; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 24px; background: #1a1e26; border: none; border-radius: 40px; color: white; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(95deg, #f59e0b, #ef4444); }
        .mod-item { background: #1a1e26; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .version-list { margin-top: 10px; padding-left: 20px; border-left: 2px solid #f59e0b; }
        .version-item { padding: 5px 0; font-size: 0.8rem; }
        .loading { text-align: center; padding: 50px; color: #f59e0b; }
        @media (max-width: 768px) { th, td { font-size: 0.7rem; padding: 8px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">👑 MODCOMBO ADMIN PANEL</div>
            <p style="color: #9ca3af;">Kelola User, Mod, dan Approval Login</p>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('pending')">⏳ Menunggu Approval</button>
            <button class="tab-btn" onclick="showTab('users')">👥 Semua User</button>
            <button class="tab-btn" onclick="showTab('mods')">📦 Semua Mod</button>
            <button class="tab-btn" onclick="showTab('history')">📜 Riwayat Login</button>
        </div>

        <!-- Tab Menunggu Approval -->
        <div id="pendingTab">
            <div class="user-card">
                <h3>⏳ User Menunggu Persetujuan</h3>
                <div id="pendingList" class="loading"><i class="fas fa-spinner fa-pulse"></i> Memuat...</div>
            </div>
        </div>

        <!-- Tab Semua User -->
        <div id="usersTab" style="display: none;">
            <div class="user-card">
                <h3>👥 Semua User</h3>
                <input type="text" id="searchUser" class="search-input" placeholder="Cari user...">
                <div id="usersList"></div>
            </div>
        </div>

        <!-- Tab Semua Mod -->
        <div id="modsTab" style="display: none;">
            <div class="user-card">
                <h3>📦 Semua Mod</h3>
                <input type="text" id="searchMod" class="search-input" placeholder="Cari mod...">
                <div id="modsList"></div>
            </div>
        </div>

        <!-- Tab Riwayat Login -->
        <div id="historyTab" style="display: none;">
            <div class="user-card">
                <h3>📜 Riwayat Login</h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config - Realtime Database
        const firebaseConfig = { 
            apiKey: "AIzaSyB2-Z1kNTdvhzSZHdkxeTU9sGI66YwQPrY", 
            authDomain: "arsalwaysss-e0226.firebaseapp.com", 
            databaseURL: "https://arsalwaysss-e0226-default-rtdb.firebaseio.com",
            projectId: "arsalwaysss-e0226", 
            storageBucket: "arsalwaysss-e0226.firebasestorage.app", 
            messagingSenderId: "762015150179", 
            appId: "1:762015150179:web:a936f5ef5a3971bd5fc856" 
        };
        
        if (!firebase.apps || !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        
        let allUsers = [];
        let allMods = [];
        let allHistory = [];
        
        async function loadAllData() {
            try {
                // Tampilkan loading
                document.getElementById('pendingList').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Memuat data...</div>';
                
                // Load users dari Realtime Database
                const usersSnap = await db.ref('users').once('value');
                allUsers = [];
                if (usersSnap.exists()) {
                    const users = usersSnap.val();
                    for (let id in users) {
                        allUsers.push({ id: id, ...users[id] });
                    }
                }
                console.log("✅ Users loaded:", allUsers.length);
                
                // Load mods dari Realtime Database
                allMods = [];
                for (const user of allUsers) {
                    try {
                        const modsSnap = await db.ref(`users_mods/${user.id}/apps`).once('value');
                        if (modsSnap.exists()) {
                            const apps = modsSnap.val();
                            for (let key in apps) {
                                allMods.push({ ...apps[key], userId: user.id, username: user.displayName || user.email, appKey: key });
                            }
                        }
                    } catch(e) { console.log(e); }
                }
                console.log("✅ Mods loaded:", allMods.length);
                
                // Load history dari Realtime Database
                const historySnap = await db.ref('login_history').once('value');
                allHistory = [];
                if (historySnap.exists()) {
                    const history = historySnap.val();
                    for (let id in history) {
                        allHistory.push({ id: id, ...history[id] });
                    }
                    allHistory.reverse();
                }
                console.log("✅ History loaded:", allHistory.length);
                
                updateStats();
                renderPending();
                renderUsers();
                renderMods();
                renderHistory();
                
            } catch (error) {
                console.error("❌ Error loading data:", error);
                document.getElementById('pendingList').innerHTML = '<div class="loading" style="color:#ef4444;">Error: ' + error.message + '</div>';
            }
        }
        
        function updateStats() {
            const pending = allUsers.filter(u => u.status === 'pending' || !u.status).length;
            const approved = allUsers.filter(u => u.status === 'approved').length;
            const rejected = allUsers.filter(u => u.status === 'rejected').length;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-number">${allUsers.length}</div><div>Total User</div></div>
                <div class="stat-card"><div class="stat-number">${allMods.length}</div><div>Total Mod</div></div>
                <div class="stat-card"><div class="stat-number">${pending}</div><div>Menunggu</div></div>
                <div class="stat-card"><div class="stat-number">${approved}</div><div>Disetujui</div></div>
                <div class="stat-card"><div class="stat-number">${rejected}</div><div>Ditolak</div></div>
            `;
        }
        
        function renderPending() {
            const pending = allUsers.filter(u => u.status === 'pending' || !u.status);
            const container = document.getElementById('pendingList');
            if (pending.length === 0) {
                container.innerHTML = '<div class="loading">✨ Tidak ada user menunggu persetujuan</div>';
                return;
            }
            container.innerHTML = `
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Nama</th>
                            <th>Foto</th>
                            <th>Waktu Daftar</th>
                            <th>Aksi</th>
                        </thead>
                    <tbody>
                        ${pending.map(user => `
                             <tr>
                                  <td style="vertical-align:middle;">${user.email || '-'}<br><span style="font-size:0.7rem; color:#9ca3af;">${user.uid ? '(UID: ' + user.uid.substring(0,8) + '...)' : ''}</span>${user.email || '-'}
                                  <span style="font-size:0.7rem; color:#9ca3af;">${user.uid ? '(UID: ' + user.uid.substring(0,8) + '...)' : ''}</span>
                                  </td>
                                  <td style="vertical-align:middle;">${user.displayName || '-'}</td>
                                  <td style="vertical-align:middle;"><img src="${user.photoURL || 'https://ui-avatars.com/api/?background=f59e0b&color=fff&name=' + (user.displayName || 'U')}" width="40" height="40" style="border-radius:50%;"></td>
                                  <td style="vertical-align:middle;">${user.createdAt ? new Date(user.createdAt).toLocaleString() : '-'}</td>
                                  <td style="vertical-align:middle;">
                                    <button class="btn btn-success btn-sm" onclick="approveUser('${user.id}')" style="margin-right:5px;">✅ Setujui</button>
                                    <button class="btn btn-danger btn-sm" onclick="rejectUser('${user.id}')">❌ Tolak</button>
                                  </td>
                              </tr>
                        `).join('')}
                    </tbody>
                 </table>
            `;
        }
        
        function renderUsers() {
            const search = document.getElementById('searchUser')?.value.toLowerCase() || '';
            const filtered = allUsers.filter(u => 
                (u.displayName || '').toLowerCase().includes(search) || 
                (u.email || '').toLowerCase().includes(search)
            );
            
            document.getElementById('usersList').innerHTML = filtered.map(user => `
                <div class="user-card">
                    <div class="user-header">
                        <div>
                            <strong>${user.displayName || 'Tanpa nama'}</strong><br>
                            <span style="color:#f59e0b;">📧 ${user.email || '-'}</span><br>
                            <span>Status: <span class="${user.status === 'approved' ? 'status-approved' : user.status === 'rejected' ? 'status-rejected' : 'status-pending'}">${user.status === 'approved' ? 'Disetujui' : user.status === 'rejected' ? 'Ditolak' : 'Menunggu'}</span></span><br>
                            <span style="font-size:0.7rem;">Bergabung: ${user.createdAt ? new Date(user.createdAt).toLocaleString() : '-'}</span>
                        </div>
                        <div>
                            <button class="btn btn-warning btn-sm" onclick="editUser('${user.id}', '${user.displayName}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')">Hapus</button>
                        </div>
                    </div>
                    <div style="margin-top:10px; padding-left:15px; border-left:2px solid #f59e0b;">
                        <strong>📦 Mod yang diupload (${allMods.filter(m => m.userId === user.id).length}):</strong>
                        ${allMods.filter(m => m.userId === user.id).map(mod => `
                            <div class="mod-item">
                                <div style="display:flex; justify-content:space-between;">
                                    <div><strong>${mod.icon || '📱'} ${mod.title}</strong> (${mod.category === 'game' ? 'Game' : 'Aplikasi'})</div>
                                    <div>
                                        <button class="btn btn-warning btn-sm" onclick="editMod('${user.id}', '${mod.appKey}', '${mod.title}')">Edit</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteMod('${user.id}', '${mod.appKey}')">Hapus</button>
                                    </div>
                                </div>
                                <div class="version-list">
                                    Versi: ${mod.versions?.map(v => `v${v.version}`).join(', ') || '-'}
                                </div>
                            </div>
                        `).join('') || '<div style="color:#9ca3af;">Tidak ada mod</div>'}
                    </div>
                </div>
            `).join('');
        }
        
        function renderMods() {
            const search = document.getElementById('searchMod')?.value.toLowerCase() || '';
            const filtered = allMods.filter(m => m.title.toLowerCase().includes(search));
            
            document.getElementById('modsList').innerHTML = filtered.map(mod => `
                <div class="user-card">
                    <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                        <div>
                            <strong>${mod.icon || '📱'} ${mod.title}</strong><br>
                            <span style="color:#f59e0b;">${mod.category === 'game' ? '🎮 Game' : '📱 Aplikasi'}</span><br>
                            <span style="font-size:0.8rem;">👤 Uploader: ${mod.username} (${mod.userId.substring(0,8)}...)</span>
                        </div>
                        <div>
                            <button class="btn btn-warning btn-sm" onclick="editMod('${mod.userId}', '${mod.appKey}', '${mod.title}')">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteMod('${mod.userId}', '${mod.appKey}')">Hapus</button>
                        </div>
                    </div>
                    <div class="version-list">
                        <strong>Versi:</strong>
                        ${mod.versions?.map(v => `<div class="version-item">v${v.version} | ${v.size} | ${v.date || '-'}</div>`).join('') || '-'}
                    </div>
                </div>
            `).join('');
        }
        
        function renderHistory() {
            document.getElementById('historyList').innerHTML = allHistory.map(h => `
                <div class="user-card">
                    <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                        <div>
                            <strong style="color:${h.status === 'approved' ? '#10b981' : h.status === 'rejected' ? '#ef4444' : '#f59e0b'}">
                                ${h.status === 'approved' ? '✅ DISETUJUI' : h.status === 'rejected' ? '❌ DITOLAK' : '⏳ MENUNGGU'}
                            </strong><br>
                            <span>User: ${h.displayName || h.email || '-'}</span><br>
                            <span style="font-size:0.75rem;">Email: ${h.email || '-'}</span>
                        </div>
                        <div style="color:#9ca3af;">${h.timestamp ? new Date(h.timestamp).toLocaleString() : '-'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== FUNGSI ADMIN ==========
        async function approveUser(userId) {
            if (confirm('✅ Setujui user ini? User akan bisa login ke website.')) {
                await db.ref(`users/${userId}`).update({ 
                    status: 'approved', 
                    approvedAt: new Date().toISOString() 
                });
                
                const user = allUsers.find(u => u.id === userId);
                await db.ref('login_history').push({
                    email: user?.email,
                    displayName: user?.displayName,
                    status: 'approved',
                    timestamp: new Date().toISOString()
                });
                
                await loadAllData();
                alert('✅ User berhasil disetujui!');
            }
        }
        
        async function rejectUser(userId) {
            if (confirm('❌ Tolak user ini? User tidak bisa login ke website.')) {
                await db.ref(`users/${userId}`).update({ 
                    status: 'rejected', 
                    rejectedAt: new Date().toISOString() 
                });
                
                const user = allUsers.find(u => u.id === userId);
                await db.ref('login_history').push({
                    email: user?.email,
                    displayName: user?.displayName,
                    status: 'rejected',
                    timestamp: new Date().toISOString()
                });
                
                await loadAllData();
                alert('❌ User ditolak!');
            }
        }
        
        async function editUser(userId, currentName) {
            const newName = prompt('Edit nama user:', currentName);
            if (newName && newName !== currentName) {
                await db.ref(`users/${userId}`).update({ displayName: newName });
                await loadAllData();
                alert('✅ Nama user berhasil diubah!');
            }
        }
        
        async function deleteUser(userId) {
            if (confirm('⚠️ Hapus user ini? Semua modnya juga akan terhapus!')) {
                await db.ref(`users_mods/${userId}`).remove();
                await db.ref(`users/${userId}`).remove();
                await loadAllData();
                alert('✅ User berhasil dihapus!');
            }
        }
        
        async function deleteMod(userId, appKey) {
            if (confirm('Hapus mod ini?')) {
                await db.ref(`users_mods/${userId}/apps/${appKey}`).remove();
                await loadAllData();
                alert('✅ Mod berhasil dihapus!');
            }
        }
        
        async function editMod(userId, appKey, currentTitle) {
            const newTitle = prompt('Edit judul mod:', currentTitle);
            if (newTitle && newTitle !== currentTitle) {
                await db.ref(`users_mods/${userId}/apps/${appKey}`).update({ title: newTitle });
                await loadAllData();
                alert('✅ Judul mod berhasil diubah!');
            }
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab === 'pending') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('pendingTab').style.display = 'block';
                document.getElementById('usersTab').style.display = 'none';
                document.getElementById('modsTab').style.display = 'none';
                document.getElementById('historyTab').style.display = 'none';
            } else if (tab === 'users') {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('pendingTab').style.display = 'none';
                document.getElementById('usersTab').style.display = 'block';
                document.getElementById('modsTab').style.display = 'none';
                document.getElementById('historyTab').style.display = 'none';
            } else if (tab === 'mods') {
                document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
                document.getElementById('pendingTab').style.display = 'none';
                document.getElementById('usersTab').style.display = 'none';
                document.getElementById('modsTab').style.display = 'block';
                document.getElementById('historyTab').style.display = 'none';
            } else if (tab === 'history') {
                document.querySelector('.tab-btn:nth-child(4)').classList.add('active');
                document.getElementById('pendingTab').style.display = 'none';
                document.getElementById('usersTab').style.display = 'none';
                document.getElementById('modsTab').style.display = 'none';
                document.getElementById('historyTab').style.display = 'block';
            }
        }
        
        document.getElementById('searchUser')?.addEventListener('input', renderUsers);
        document.getElementById('searchMod')?.addEventListener('input', renderMods);
        
        window.showTab = showTab;
        window.approveUser = approveUser;
        window.rejectUser = rejectUser;
        window.editUser = editUser;
        window.deleteUser = deleteUser;
        window.deleteMod = deleteMod;
        window.editMod = editMod;
        
        // Load data setelah halaman siap
        loadAllData();
    </script>
</body>
</html>
